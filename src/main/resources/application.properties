spring.application.name=swapi

swapi.base-url=https://www.swapi.tech/api

server.port=${PORT:8080}

app.security.user.name=${APP_SECURITY_USER_NAME:${APP_USERNAME:swapi}}
app.security.user.password=${APP_SECURITY_USER_PASSWORD:${APP_PASSWORD:swapi123}}

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:${JWT_SECRET:changeit-changeit-changeit-changeit}}
app.security.jwt.expiration-minutes=60